<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Studio - 🐷之家</title>

  <style>
    /* 统一系统字体，全局白色文字 */
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin:0;
      padding:7vh 20px 10vh;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      position:relative;
      color:#fff; 
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      background-image:image-set(
        url("/mountain-1920.jpg") 1x,
        url("/mountain-3840.jpg") 2x
      );
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      transform:translateZ(0);
      will-change:transform;
    }

    /* 统一的清透滤镜，替代原来的深色遮罩 */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.05) 0%,
        rgba(0,0,0,0.10) 55%,
        rgba(0,0,0,0.16) 100%
      );
    }

    .nav{
      width:100%;
      max-width:1020px;
      margin-bottom:18px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    
    .btn{
      text-decoration:none;
      font-size:0.95em;
      padding:8px 14px;
      border-radius:10px;
      display:inline-block;
      transition:.2s;
      white-space:nowrap;
      color:rgba(255,255,255,0.92);
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:0 10px 25px rgba(0,0,0,0.14);
    }
    .btn:hover{transform:translateY(-1px);background:rgba(255,255,255,0.18);}

    .brand{display:flex;align-items:center;gap:10px;user-select:none;}
    .brand-logo{width:26px;height:26px;display:block;opacity:.95;}
    .brand-name{font-weight:700;letter-spacing:.5px;color:rgba(255,255,255,0.92);text-shadow:0 5px 15px rgba(0,0,0,0.2);}

    .header{width:100%;max-width:1020px;margin:8px 0 18px;color:#fff;}
    
    /* === 完美对齐的标题魔法 === */
    .header h1{
      margin:0 0 6px;
      font-size:2.4em;
      font-weight:600;
      letter-spacing:1px;
      text-shadow:0 10px 30px rgba(0,0,0,0.20);
    }
    .header h1 svg {
      width: 1.15em;
      height: 1.15em;
      vertical-align: middle;
      position: relative;
      top: -0.08em;
      margin-right: 6px;
    }

    .header p{margin:0;opacity:.92;line-height:1.6;font-size:1.1em;text-shadow:0 10px 30px rgba(0,0,0,0.18);}

    .section{width:100%;max-width:1020px;margin:26px 0 44px;}
    .section h2{
      margin:0 0 14px;
      padding-left:10px;
      border-left:4px solid #00b894; /* 呼应薄荷绿图标 */
      font-size:1.2em;
      font-weight:600;
      color:rgba(255,255,255,0.95);
      text-shadow:0 10px 30px rgba(0,0,0,0.18);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:18px;
    }

    /* 统一的浅色透亮玻璃卡片 */
    .card{
      background:rgba(255,255,255,0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,0.25);
      border-radius:14px;
      overflow:hidden;
      box-shadow:0 14px 45px rgba(0,0,0,0.14);
      transition:all .3s ease;
      color:#fff;
    }
    .card:hover{
        transform:translateY(-6px);
        background:rgba(255,255,255,0.28);
    }

    .img-wrap{
      background:rgba(0,0,0,0.1); /* 图片底色改为极其微弱的暗色，融合得更好 */
      display:flex;
      align-items:center;
      justify-content:center;
      padding:12px;
    }
    .card img{
      max-width:100%;
      height:auto;
      display:block;
      object-fit:contain;
      border-radius:10px;
    }

    .meta{
      padding:10px 14px 14px;
      border-top:1px solid rgba(255,255,255,0.15); /* 分割线变浅 */
      color:rgba(255,255,255,0.85); /* 描述文字半透明 */
      font-size:.92em;
      line-height:1.5;
    }
    .meta b{color:#ffffff;font-weight:600;}

    .card.fullscreen{cursor:zoom-in;}
    .card:not(.fullscreen){cursor:default;}

    /* 灯箱效果保持不变（适合看图） */
    .lb{
      position:fixed; inset:0;
      background:rgba(0,0,0,0.86);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }
    .lb.show{display:flex;}
    .lb-inner{width:100vw;height:100vh;position:relative;background:#0b0f14;}
    .lb-img{width:100%;height:100%;object-fit:contain;display:block;background:#0b0f14;}
    .lb-close{
      position:absolute; top:14px; right:14px;
      border:none;
      background:rgba(255,255,255,0.12);
      color:#e2e8f0;
      padding:10px 12px;
      border-radius:12px;
      cursor:pointer;
      z-index:2;
    }
    .lb-close:hover{background:rgba(255,255,255,0.18);}
    .lb-top{
      position:absolute; left:0; right:0; top:0;
      padding:10px 14px;
      display:flex; justify-content:space-between; align-items:center;
      color:#cbd5e1; font-size:.92em;
      background:linear-gradient(to bottom, rgba(0,0,0,0.55), rgba(0,0,0,0));
      pointer-events:none;
    }
    .lb-title{ overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:70vw; }
  </style>
</head>

<body>
  <div class="nav">
    <a class="btn" href="ha.html">← 返回 Home Assistant</a>
    <div class="brand" title="🐷之家">
      <img class="brand-logo" src="/favicon.svg" alt="logo" onerror="this.style.display='none'">
      <div class="brand-name">🐷之家</div>
    </div>
  </div>

  <div class="header">
    <h1>
        <svg viewBox="0 0 24 24" fill="#00b894">
            <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
        </svg><span>HA Studio</span>
    </h1>
    <p>小图按原比例展示；仅「概览」支持点击全屏（ESC 可关闭）</p>
  </div>

  <div id="content"></div>

  <div class="lb" id="lb" aria-hidden="true">
    <div class="lb-inner">
      <img class="lb-img" id="lbImg" alt="preview" />
      <div class="lb-top">
        <div class="lb-title" id="lbText"></div>
        <div>ESC 关闭</div>
      </div>
      <button class="lb-close" id="lbClose">关闭</button>
    </div>
  </div>

<script>
  const BASE = "images/studio/";
  const rooms = [
    { key:"overview",  name:"🏠 概览",   count:2, fullscreen:true  },
    { key:"water",     name:"💧 饮水机", count:1, fullscreen:false },
    { key:"power",     name:"🔌 供电",   count:1, fullscreen:false },
    { key:"living",    name:"🛋 客厅",   count:2, fullscreen:false },
    { key:"dining",    name:"🍽 餐厅",   count:2, fullscreen:false },
    { key:"master",    name:"🛏 主卧",   count:2, fullscreen:false },
    { key:"guest",     name:"🛌 次卧",   count:2, fullscreen:false },
    { key:"bathroom",  name:"🚿 卫生间", count:2, fullscreen:false },
    { key:"meter",     name:"⚡ 电表",   count:2, fullscreen:true }
  ];

  const container = document.getElementById("content");
  const lb = document.getElementById("lb");
  const lbImg = document.getElementById("lbImg");
  const lbText = document.getElementById("lbText");
  const lbClose = document.getElementById("lbClose");

  function openLb(src, title){
    lbImg.src = src;
    lbText.textContent = title || "";
    lb.classList.add("show");
    lb.setAttribute("aria-hidden", "false");
    document.documentElement.style.overflow = "hidden";
    document.body.style.overflow = "hidden";
  }
  function closeLb(){
    lb.classList.remove("show");
    lb.setAttribute("aria-hidden", "true");
    lbImg.src = "";
    document.documentElement.style.overflow = "";
    document.body.style.overflow = "";
  }
  lbClose.onclick = closeLb;
  lb.addEventListener("click", (e)=>{ if(e.target === lb) closeLb(); });
  document.addEventListener("keydown", (e)=>{
    if(e.key === "Escape" && lb.classList.contains("show")) closeLb();
  });

  rooms.forEach(room => {
    let html = `
      <div class="section">
        <h2>${room.name}</h2>
        <div class="grid">
    `;

    for(let i=1;i<=room.count;i++){
      const src = `${BASE}${room.key}-${i}.jpg`;
      const title = `${room.name} · 第 ${i} 张`;

      html += `
        <div class="card ${room.fullscreen ? 'fullscreen' : ''}"
             ${room.fullscreen ? `data-src="${src}" data-title="${escapeHtml(title)}"` : ""}>
          <div class="img-wrap">
            <img src="${src}" alt="${escapeHtml(title)}"
                 onerror="this.closest('.card').style.display='none'">
          </div>
          <div class="meta">
            <b>${escapeHtml(room.name)}</b> · 第 ${i} 张${room.fullscreen ? '（点击全屏）' : ''}
          </div>
        </div>
      `;
    }

    html += `
        </div>
      </div>
    `;
    container.insertAdjacentHTML("beforeend", html);
  });

  document.querySelectorAll(".card.fullscreen").forEach(card=>{
    card.addEventListener("click", ()=> openLb(card.dataset.src, card.dataset.title));
  });

  function escapeHtml(str){
    return (str||'').replace(/[&<>"']/g, s=>({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[s]));
  }
</script>

</body>
</html>
