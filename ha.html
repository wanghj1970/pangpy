<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant - 🐷之家</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <style>
    /* 统一使用和 index.html 一模一样的字体库，确保文字显示完全一致 */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 8vh 20px 10vh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      color: #fff;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: image-set(url("/mountain-1920.jpg") 1x,
          url("/mountain-3840.jpg") 2x);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: translateZ(0);
      will-change: transform;
    }

    /* 保持和首页一致的清透滤镜 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.05) 0%,
          rgba(0, 0, 0, 0.10) 55%,
          rgba(0, 0, 0, 0.16) 100%);
    }

    .nav {
      width: 100%;
      max-width: 900px;
      margin-bottom: 24px;
    }

    .back-btn {
      text-decoration: none;
      font-size: 0.95em;
      padding: 8px 14px;
      border-radius: 10px;
      display: inline-block;
      transition: all .2s;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.14);
    }

    .back-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.18);
    }

    .header {
      text-align: center;
      margin: 10px 0 36px;
      color: #fff;
    }

    /* === 核心魔法 1：彻底解决标题与图标的对齐问题 === */
    .header h1 {
      margin: 0 0 8px;
      font-size: 2.6em;
      /* 统一为 index.html 的字号 */
      font-weight: 600;
      /* 统一为 index.html 的字重 */
      letter-spacing: 1px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.20);
    }

    .header h1 svg {
      width: 1.15em;
      /* 稍微放大，让它和英文字母 H 等高 */
      height: 1.15em;
      vertical-align: middle;
      /* 核心代码：强制垂直居中 */
      position: relative;
      top: -0.08em;
      /* 视觉微调：向上抬起极其微小的一点点，完美平齐大写字母中心 */
      margin-right: 8px;
      /* 与文字留出呼吸空间 */
    }

    .header p {
      margin: 0;
      opacity: .92;
      font-size: 1.1em;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .grid {
      width: 100%;
      max-width: 700px;
      /* 和首页卡片组宽度保持一致 */
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
      /* 和首页保持一致的间距 */
    }

    /* === 核心魔法 2：完全复刻 index.html 的浅色透亮毛玻璃 === */
    .card {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.22);
      border-radius: 18px;
      padding: 30px 25px;
      /* 统一为 index.html 的内边距 */
      text-align: center;
      text-decoration: none;
      color: #fff;
      transition: all .3s ease;
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .card:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.28);
    }

    .icon {
      font-size: 2.6em;
      display: block;
      margin-bottom: 15px;
    }

    /* 和首页完全一致 */
    .card h3 {
      margin: 0 0 12px;
      font-size: 1.3em;
      font-weight: 500;
    }

    .card p {
      margin: 0;
      font-size: .95em;
      line-height: 1.6;
      opacity: .92;
    }

    /* ✅ Apple 风：底部版权区（新增） */
    .site-footer {
      width: 100%;
      max-width: 820px;
      margin-top: 22px;
      /* 紧跟 about，留一点呼吸 */
      padding: 18px 6px 0;
      text-align: center;
      font-size: 12px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.70);
      letter-spacing: 0.2px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .site-footer .footer-line {
      margin: 6px 0;
    }

    .site-footer a {
      color: rgba(255, 255, 255, 0.86);
      text-decoration: none;
    }

    .site-footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 520px) {
      body {
        padding: 8vh 14px 10vh;
      }

      .about {
        padding: 26px 20px;
      }

      .site-footer {
        padding-top: 14px;
        font-size: 11px;
      }
    }
  </style>
</head>
