<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant - 🐷之家</title>

  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 8vh 20px 10vh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      color: #ffffff; /* 整体字体颜色变白 */
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: image-set(
        url("/mountain-1920.jpg") 1x,
        url("/mountain-3840.jpg") 2x
      );
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: translateZ(0);
      will-change: transform;
    }

    /* 科技：更轻、更冷 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(
        to bottom,
        rgba(10, 18, 28, 0.10) 0%,
        rgba(10, 18, 28, 0.14) 55%,
        rgba(10, 18, 28, 0.18) 100%
      );
    }

    .nav { width: 100%; max-width: 900px; margin-bottom: 24px; }
    .back-btn {
      text-decoration: none;
      font-size: 0.95em;
      padding: 8px 14px;
      border-radius: 10px;
      display: inline-block;
      transition: all .2s;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.14);
    }
    .back-btn:hover { transform: translateY(-1px); background: rgba(255, 255, 255, 0.18); }

    .header { text-align: center; margin: 10px 0 36px; color: #fff; }
    
    /* 核心魔法 1：完美的标题对齐 */
    .header h1 { 
        margin: 0 0 8px; 
        font-size: 2.2em; 
        font-weight: 700; 
        letter-spacing: .5px; 
        text-shadow: 0 10px 30px rgba(0, 0, 0, 0.20);
        display: flex; /* 开启弹性盒子 */
        align-items: center; /* 垂直绝对居中 */
        justify-content: center; /* 水平绝对居中 */
        gap: 12px; /* 图标和文字的间距 */
    }
    .header h1 svg {
        width: 1.1em; /* 稍微放大图标，让它和全大写字母高度一致 */
        height: 1.1em;
        display: block;
    }

    .header p { margin: 0; opacity: .92; text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18); }

    .grid {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    /* 核心魔法 2：深色高级毛玻璃特效 */
    .card {
        background: rgba(0, 0, 0, 0.35); /* 半透明黑色底色 */
        backdrop-filter: blur(12px); /* 12px 的背景模糊 */
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.15); /* 玻璃边缘高光 */
        padding: 34px 26px;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2); /* 深邃阴影 */
        text-decoration: none;
        transition: all 0.3s ease;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* 悬浮时的动态玻璃反光效果 */
    .card:hover {
        transform: translateY(-5px);
        background: rgba(0, 0, 0, 0.45);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .icon { font-size: 3.2em; display: block; margin-bottom: 15px; }
    
    .card h3 { 
        color: #ffffff; /* 确保标题是纯白 */
        margin: 0 0 10px; 
        font-size: 1.35em; 
    }
    
    .card p { 
        color: rgba(255, 255, 255, 0.75); /* 确保副标题是半透明白 */
        margin: 0; 
        line-height: 1.55; 
        font-size: .98em; 
    }

    .note {
      width: 100%;
      max-width: 900px;
      margin-top: 22px;
      font-size: .92em;
      line-height: 1.6;
      text-align: center;
      color: rgba(255, 255, 255, 0.85);
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }
  </style>
</head>

<body>

</body>
</html>
