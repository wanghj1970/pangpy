<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home Assistant - 🐷之家</title>

  <style>
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      margin:0;
      padding:8vh 20px 10vh;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;

      background-image:url("/mountain.jpg");
      background-size:cover;
      background-position:center;
      background-attachment:fixed;

      position:relative;
      color:#2c3e50;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:linear-gradient(
        to bottom,
        rgba(10,18,28,0.10) 0%,
        rgba(10,18,28,0.14) 55%,
        rgba(10,18,28,0.18) 100%
      );
      z-index:-1;
    }

    .nav{width:100%;max-width:900px;margin-bottom:24px;}
    .back-btn{
      text-decoration:none;
      font-size:0.95em;
      padding:8px 14px;
      border-radius:10px;
      display:inline-block;
      transition:all .2s;

      color:rgba(255,255,255,0.92);
      background:rgba(255,255,255,0.12);
      border:1px solid rgba(255,255,255,0.22);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 25px rgba(0,0,0,0.14);
    }
    .back-btn:hover{transform:translateY(-1px);background:rgba(255,255,255,0.18);}

    .header{text-align:center;margin:10px 0 36px;color:#fff;}
    .header h1{margin:0 0 8px;font-size:2.1em;font-weight:700;letter-spacing:.5px;text-shadow:0 10px 30px rgba(0,0,0,0.20);}
    .header p{margin:0;opacity:.92;text-shadow:0 10px 30px rgba(0,0,0,0.18);}

    .grid{
      width:100%;
      max-width:900px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:22px;
    }
    .card{
      background:rgba(255,255,255,0.86);
      backdrop-filter: blur(10px);
      border:1px solid rgba(255,255,255,0.28);
      padding:34px 26px;
      border-radius:16px;
      box-shadow:0 14px 45px rgba(0,0,0,0.14);
      text-decoration:none;
      color:inherit;
      transition:all .25s ease;
      border-top:4px solid transparent;
      text-align:center;
    }
    .card:hover{transform:translateY(-7px);box-shadow:0 22px 60px rgba(0,0,0,0.18);}
    .icon{font-size:3em;display:block;margin-bottom:12px;}
    .card h3{margin:0 0 10px;font-size:1.35em;}
    .card p{margin:0;color:#556070;line-height:1.55;font-size:.98em;}

    .card.plc:hover{border-top-color:#03a9f4;}
    .card.studio:hover{border-top-color:#ff9800;}

    .note{
      width:100%;
      max-width:900px;
      margin-top:22px;
      font-size:.92em;
      line-height:1.6;
      text-align:center;
      color:rgba(255,255,255,0.85);
      text-shadow:0 10px 30px rgba(0,0,0,0.18);
    }
  </style>
</head>
<body>
  <div class="nav">
    <a class="back-btn" href="index.html">← 返回🐷之家</a>
  </div>

  <div class="header">
    <h1>🏠 Home Assistant</h1>
    <p>PLC HA（实时系统） + HA Studio（截图展厅）</p>
  </div>

  <div class="grid">
    <a class="card plc" href="https://ha.pangpy.com" target="_blank" rel="noopener">
      <span class="icon">⚙️</span>
      <h3>PLC HA（实时系统）</h3>
      <p>实时状态 / 自动化 / 控制中心</p>
    </a>

    <a class="card studio" href="ha-studio.html">
      <span class="icon">🖼️</span>
      <h3>HA Studio（展厅）</h3>
      <p>概览 / 饮水机 / 供电 / 各房间 / 电表</p>
    </a>
  </div>

  <div class="note">
    提示：Studio 用来“展示”，PLC HA 用来“操作”。两者分离更安全、更清爽。
  </div>
</body>
</html>
