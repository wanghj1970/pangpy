<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷之家</title>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            margin: 0;
            padding: 10vh 20px;
            min-height: 100vh;

            /* 背景图 */
            background-image: url("mountain.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;

            /* 叠加暗色滤镜提高文字可读性 */
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 半透明遮罩层 */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.35);
            z-index: -1;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            color: white;
        }

        .header h1 {
            font-weight: 600;
            font-size: 2.6em;
            letter-spacing: 3px;
            margin: 0;
        }

        .header p {
            font-size: 1.1em;
            margin-top: 12px;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 700px;
        }

        .card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 30px 25px;
            text-align: center;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .card:hover {
            transform: translateY(-6px);
            background: rgba(255,255,255,0.25);
        }

        .card h3 {
            margin: 0 0 12px 0;
            font-size: 1.3em;
            font-weight: 500;
        }

        .card p {
            font-size: 0.95em;
            line-height: 1.6;
            margin: 0;
            opacity: 0.9;
        }

        .icon {
            font-size: 2.6em;
            margin-bottom: 15px;
            display: block;
        }

        @media (min-width: 620px) {
            .card.myhome {
                grid-column: 1 / -1;
                justify-self: center;
                width: 280px;
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🐷之家</h1>
        <p>欢迎回家</p>
    </div>

    <div class="grid">

        <a href="home.html" class="card myhome">
            <span class="icon">📸</span>
            <h3>我的家</h3>
            <p>家庭相册与生活记录<br>进入私密空间</p>
        </a>

        <a href="ha.html" class="card">
            <span class="icon">🏠</span>
            <h3>Home Assistant</h3>
            <p>智能家居控制中枢</p>
        </a>

        <a href="https://guac.pangpy.com" class="card" target="_blank">
            <span class="icon">🖥️</span>
            <h3>Windows RDP</h3>
            <p>Web 远程桌面连接</p>
        </a>

    </div>

</body>
</html>
