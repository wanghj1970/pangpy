<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷之家</title>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; 
            background-color: #f6f7f9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10vh 20px; 
            margin: 0; 
            color: #333; 
        }

        .header { 
            text-align: center; 
            margin-bottom: 60px; 
        }

        .header h1 { 
            font-weight: 500;
            font-size: 2.4em; 
            letter-spacing: 2px;
            margin: 0;
            color: #2d3436;
        }

        .header p { 
            color: #8a8f98; 
            font-size: 1em; 
            margin-top: 12px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto;
        }

        .card { 
            background: white; 
            padding: 30px 25px; 
            border-radius: 18px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center; 
            text-decoration: none; 
            color: inherit; 
            transition: all 0.3s ease; 
            border-top: 4px solid transparent; 
            box-sizing: border-box;
        }

        .card:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
        }

        .card.ha:hover { border-top-color: #03a9f4; }
        .card.guac:hover { border-top-color: #4caf50; }
        .card.myhome:hover { border-top-color: #ff9800; }

        @media (min-width: 620px) {
            .card.myhome {
                grid-column: 1 / -1;
                justify-self: center;
                width: 280px;
            }
        }

        .card h3 { 
            margin: 0 0 12px 0; 
            font-size: 1.3em; 
            font-weight: 500;
            color: #2d3436; 
        }

        .card p { 
            color: #8a8f98; 
            font-size: 0.9em; 
            line-height: 1.6; 
            margin: 0; 
        }

        .icon { 
            font-size: 2.6em; 
            margin-bottom: 15px; 
            display: block; 
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>🐷之家</h1>
        <p>欢迎回家</p>
    </div>

    <div class="grid">

        <a href="home.html" class="card myhome">
            <span class="icon">📸</span>
            <h3>我的家</h3>
            <p>家庭相册与生活记录<br>进入私密空间</p>
        </a>

        <a href="ha.html" class="card ha">
            <span class="icon">🏠</span>
            <h3>Home Assistant</h3>
            <p>智能家居控制中枢</p>
        </a>

        <a href="https://guac.pangpy.com" class="card guac" target="_blank">
            <span class="icon">🖥️</span>
            <h3>Windows RDP</h3>
            <p>Web 远程桌面连接</p>
        </a>

    </div>

</body>
</html>
