<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的家 - 私密空间</title>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfbfb; background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%); display: flex; flex-direction: column; align-items: center; padding: 5vh 20px 10vh; margin: 0; color: #4a4a4a; }
        .nav { width: 100%; max-width: 900px; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #ff7675; font-weight: bold; padding: 8px 16px; border-radius: 20px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.2s; display: inline-block; }
        .back-btn:hover { background: #ff7675; color: white; transform: translateX(-3px); }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #2d3436; font-size: 2.2em; margin-bottom: 5px; }
        .header p { color: #636e72; font-size: 1.1em; }
        .section-title { width: 100%; max-width: 900px; margin: 40px 0 20px; border-bottom: 2px dashed #dcdde1; padding-bottom: 10px; color: #2d3436; display: flex; align-items: center; gap: 10px; font-weight: normal; }

        /* --- 新增：思念专属入口卡片 --- */
        .memorial-banner {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(to right, #ffffff, #f9f9f9);
            border-left: 4px solid #b2bec3;
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .memorial-banner:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.06); border-left-color: #a29bfe; }
        .memorial-text h3 { margin: 0 0 8px 0; color: #2d3436; font-size: 1.3em; font-weight: 500; }
        .memorial-text p { margin: 0; color: #8395a7; font-size: 0.95em; }
        .memorial-icon { font-size: 2em; color: #b2bec3; opacity: 0.8; }
        /* ------------------------------ */

        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .photo-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
        .photo-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .photo-img { width: 100%; height: 200px; object-fit: cover; background-color: #ffeaa7; display: flex; align-items: center; justify-content: center; font-size: 2em; color: #b2bec3; }
        .photo-info { padding: 15px; }
        .photo-info p { margin: 0; color: #636e72; font-size: 0.95em; }

        .timeline { width: 100%; max-width: 900px; position: relative; padding-left: 20px; }
        .timeline::before { content: ''; position: absolute; left: 0; top: 5px; bottom: 0; width: 4px; background: #dfe6e9; border-radius: 2px; }
        .log-entry { position: relative; margin-bottom: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
        .log-entry::before { content: ''; position: absolute; left: -26px; top: 20px; width: 16px; height: 16px; background: #74b9ff; border-radius: 50%; border: 3px solid #fdfbfb; }
        .log-date { font-size: 0.85em; color: #0984e3; font-weight: bold; margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
        .log-content { margin: 0; color: #2d3436; line-height: 1.6; }
        .log-weather { float: right; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" class="back-btn">← 返回导航页</a>
    </div>

    <div class="header">
        <h1>🐷之家的私密日记</h1>
        <p>把平凡的日子，过成闪闪发光的碎片</p>
    </div>

    <a href="memorial.html" class="memorial-banner">
        <div class="memorial-text">
            <h3>🕊️ 寄往天堂的信</h3>
            <p>永远怀念你 · 9月22日</p>
        </div>
        <div class="memorial-icon">🤍</div>
    </a>

    <h2 class="section-title">📸 高光时刻</h2>
    <div class="photo-grid">
        <div class="photo-card">
            <div class="photo-img">暂无图片</div>
            <div class="photo-info"><p>生活中的小确幸，留在这里。</p></div>
        </div>
        <div class="photo-card">
            <div class="photo-img">暂无图片</div>
            <div class="photo-info"><p>今天家里做的大餐，必须记录一下。</p></div>
        </div>
    </div>

    <h2 class="section-title">📝 琐碎日常</h2>
    <div class="timeline">
        <div class="log-entry">
            <span class="log-weather">☁️</span>
            <span class="log-date">刚刚</span>
            <p class="log-content">在这里为你留了一个最安静的角落。思念有声，岁月无恙。</p>
        </div>
    </div>

</body>
</html>
