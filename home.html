<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的家 - 私密空间</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <style>
    body{
      font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
      margin:0;
      padding:5vh 20px 10vh;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      position:relative;
      color:#111827;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;
      background-image:image-set(
        url("/mountain-1920.jpg") 1x,
        url("/mountain-3840.jpg") 2x
      );
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      transform:translateZ(0);
      will-change:transform;
    }

    /* 温暖：偏棕色遮罩 */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      background:linear-gradient(
        to bottom,
        rgba(40,30,20,0.10) 0%,
        rgba(40,30,20,0.16) 55%,
        rgba(40,30,20,0.22) 100%
      );
    }

    .nav{ width:100%; max-width:900px; margin-bottom:20px; }
    .back-btn{
      text-decoration:none;
      font-weight:700;
      padding:8px 16px;
      border-radius:20px;
      display:inline-block;
      transition:.2s;
      color:rgba(255,255,255,0.92);
      background:rgba(255,255,255,0.14);
      border:1px solid rgba(255,255,255,0.22);
      backdrop-filter:blur(10px);
      box-shadow:0 10px 25px rgba(0,0,0,0.14);
    }
    .back-btn:hover{ transform:translateX(-3px); background:rgba(255,255,255,0.20); }

    .header{ text-align:center; margin-bottom:40px; color:#fff; }
    .header h1{ margin:0 0 6px; font-size:2.2em; letter-spacing:2px; text-shadow:0 10px 30px rgba(0,0,0,0.22); }
    .header p{ margin:0; font-size:1.1em; opacity:.92; text-shadow:0 10px 30px rgba(0,0,0,0.18); }

    .memorial-banner{
      width:100%;
      max-width:900px;
      border-left:4px solid rgba(255,255,255,0.55);
      border-radius:12px;
      padding:25px 30px;
      margin-bottom:10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      text-decoration:none;
      color:inherit;
      transition:.3s;
      box-sizing:border-box;
      background:rgba(255,255,255,0.82);
      backdrop-filter:blur(10px);
      box-shadow:0 14px 45px rgba(0,0,0,0.14);
    }
    .memorial-banner:hover{
      transform:translateY(-3px);
      box-shadow:0 22px 60px rgba(0,0,0,0.18);
      border-left-color:rgba(201,79,109,0.7);
    }
    .memorial-text h3{ margin:0 0 8px; color:#111827; font-size:1.3em; font-weight:700; }
    .memorial-text p{ margin:0; color:#566273; font-size:.95em; }
    .memorial-icon{ font-size:2em; color:#c94f6d; opacity:.85; }

    .section-title{
      width:100%;
      max-width:900px;
      margin:40px 0 20px;
      border-bottom:2px dashed rgba(255,255,255,0.35);
      padding-bottom:10px;
      color:rgba(255,255,255,0.92);
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:normal;
      text-shadow:0 10px 30px rgba(0,0,0,0.18);
    }

    .photo-grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:20px;
      width:100%;
      max-width:900px;
    }
    .photo-card{
      border-radius:12px;
      overflow:hidden;
      transition:.3s;
      background:rgba(255,255,255,0.82);
      backdrop-filter:blur(10px);
      box-shadow:0 14px 45px rgba(0,0,0,0.14);
    }
    .photo-card:hover{
      transform:translateY(-5px);
      box-shadow:0 22px 60px rgba(0,0,0,0.18);
    }

    .photo-img{
      width:100%;
      height:250px;
      object-fit:cover;
      cursor:pointer;
      transition:opacity .3s;
      background:#f1f5f9;
      display:block;
    }
    .photo-img:hover{ opacity:.88; }
    .photo-info{ padding:15px; }
    .photo-info p{ margin:0; color:#374151; font-size:.95em; line-height:1.5; }

    .modal{
      display:none;
      position:fixed;
      z-index:1000;
      left:0; top:0;
      width:100%; height:100%;
      background-color:rgba(0,0,0,0.85);
      backdrop-filter:blur(5px);
    }
    .modal-content{
      margin:auto;
      display:block;
      max-width:90%;
      max-height:90vh;
      position:absolute;
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      border-radius:10px;
      box-shadow:0 5px 25px rgba(0,0,0,0.5);
      object-fit:contain;
    }
    .close-btn{
      position:absolute;
      top:20px; right:35px;
      color:#f1f1f1;
      font-size:40px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
      z-index:1001;
    }
    .close-btn:hover{ color:#f8c6cf; }
  </style>
</head>

<body>
  <div class="nav">
    <a href="index.html" class="back-btn">← 返回导航页</a>
  </div>

  <div class="header">
    <h1>🐷之家的时光机</h1>
    <p>把平凡的日子，过成闪闪发光的碎片</p>
  </div>

  <a href="memorial.html" class="memorial-banner">
    <div class="memorial-text">
      <h3>🕊️ 寄往天堂的信</h3>
      <p>倍红· 我们永远怀念你</p>
    </div>
    <div class="memorial-icon">🤍</div>
  </a>

  <h2 class="section-title">📸 高光时刻</h2>
  <div class="photo-grid">
    <div class="photo-card">
      <img src="images/199602.jpg" class="photo-img" alt="结婚典礼" onerror="this.style.display='none'" onclick="openModal(this.src)">
      <div class="photo-info"><p>1996年9月8号，我们结婚了，开启了幸福生活！</p></div>
    </div>
    <div class="photo-card">
      <img src="images/202403.jpg" class="photo-img" alt="女儿上海大学毕业典礼" onerror="this.style.display='none'" onclick="openModal(this.src)">
      <div class="photo-info"><p>2024年6月22号，女儿上海大学毕业典礼。为你感到无比骄傲！</p></div>
    </div>
    <div class="photo-card">
      <img src="images/202501.jpg" class="photo-img" alt="女儿康奈尔大学硕士毕业典礼" onerror="this.style.display='none'" onclick="openModal(this.src)">
      <div class="photo-info"><p>2025年5月25日，女儿康奈尔大学硕士毕业典礼。开启人生新征程！</p></div>
    </div>
    <div class="photo-card">
      <img src="images/XS115599.jpg" class="photo-img" alt="女儿康奈尔大学学院大楼" onerror="this.style.display='none'" onclick="openModal(this.src)">
      <div class="photo-info"><p>2025年5月25日，女儿康奈尔大学学院大楼前毕业照。</p></div>
    </div>
  </div>

  <div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <img class="modal-content" id="fullImage" alt="full">
  </div>

  <script>
    var modal = document.getElementById("imageModal");
    var modalImg = document.getElementById("fullImage");
    function openModal(imageSrc){ modal.style.display="block"; modalImg.src=imageSrc; }
    function closeModal(){ modal.style.display="none"; }
  </script>
</body>
</html>
