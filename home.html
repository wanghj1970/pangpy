<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的家 - 私密空间</title>

    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/favicon.svg">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfbfb; background-image: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%); display: flex; flex-direction: column; align-items: center; padding: 5vh 20px 10vh; margin: 0; color: #4a4a4a; }
        .nav { width: 100%; max-width: 900px; margin-bottom: 20px; }
        .back-btn { text-decoration: none; color: #ff7675; font-weight: bold; padding: 8px 16px; border-radius: 20px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: all 0.2s; display: inline-block; }
        .back-btn:hover { background: #ff7675; color: white; transform: translateX(-3px); }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { color: #2d3436; font-size: 2.2em; margin-bottom: 5px; }
        .header p { color: #636e72; font-size: 1.1em; }
        .section-title { width: 100%; max-width: 900px; margin: 40px 0 20px; border-bottom: 2px dashed #dcdde1; padding-bottom: 10px; color: #2d3436; display: flex; align-items: center; gap: 10px; font-weight: normal; }

        /* 思念专属入口卡片 */
        .memorial-banner {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(to right, #ffffff, #f9f9f9);
            border-left: 4px solid #b2bec3;
            border-radius: 12px;
            padding: 25px 30px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .memorial-banner:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.06); border-left-color: #a29bfe; }
        .memorial-text h3 { margin: 0 0 8px 0; color: #2d3436; font-size: 1.3em; font-weight: 500; }
        .memorial-text p { margin: 0; color: #8395a7; font-size: 0.95em; }
        .memorial-icon { font-size: 2em; color: #b2bec3; opacity: 0.8; }

        /* 照片墙排版 */
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 900px; }
        .photo-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: transform 0.3s ease; }
        .photo-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .photo-info { padding: 15px; }
        .photo-info p { margin: 0; color: #636e72; font-size: 0.95em; line-height: 1.5; }

        /* 照片样式：强制高度统一，多余裁切，并增加鼠标手型提示可以点击 */
        .photo-img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            cursor: pointer; 
            transition: opacity 0.3s;
            background-color: #ffeaa7; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 2em; 
            color: #b2bec3;
        }
        .photo-img:hover { opacity: 0.85; }

        /* --- 点击放大的弹出层样式 --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px); }
        .modal-content { margin: auto; display: block; max-width: 90%; max-height: 90vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 8px; box-shadow: 0 5px 25px rgba(0,0,0,0.5); object-fit: contain; }
        .close-btn { position: absolute; top: 20px; right: 35px; color: #f1f1f1; font-size: 40px; font-weight: bold; cursor: pointer; transition: 0.3s; z-index: 1001; }
        .close-btn:hover { color: #ff7675; }

    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html" class="back-btn">← 返回导航页</a>
    </div>

    <div class="header">
        <h1>🐷之家的私密日记</h1>
        <p>把平凡的日子，过成闪闪发光的碎片</p>
    </div>

    <a href="memorial.html" class="memorial-banner">
        <div class="memorial-text">
            <h3>🕊️ 寄往天堂的信</h3>
            <p>倍红· 我们永远怀念你</p>
        </div>
        <div class="memorial-icon">🤍</div>
    </a>

    <h2 class="section-title">📸 高光时刻</h2>
    <div class="photo-grid">
        <div class="photo-card">
            <img src="images/199602.jpg" class="photo-img" alt="结婚典礼" onerror="this.style.display='none'" onclick="openModal(this.src)">
            <div class="photo-info">
                <p>1996年9月8号，我们结婚了，开启了幸福生活！</p>
            </div>
        </div>
        <div class="photo-card">
            <img src="images/202403.jpg" class="photo-img" alt="女儿上海大学毕业典礼" onerror="this.style.display='none'" onclick="openModal(this.src)">
            <div class="photo-info">
                <p>2024年6月22号，女儿上海大学毕业典礼。为你感到无比骄傲！</p>
            </div>
        </div>
        <div class="photo-card">
            <img src="images/202501.jpg" class="photo-img" alt="女儿康奈尔大学硕士毕业典礼" onerror="this.style.display='none'" onclick="openModal(this.src)">
            <div class="photo-info">
                <p>2025年5月25日，女儿康奈尔大学硕士毕业典礼。开启人生新征程！</p>
            </div>
        </div>
        <div class="photo-card">
            <img src="images/XS115599.jpg" class="photo-img" alt="女儿康奈尔大学学院大楼" onerror="this.style.display='none'" onclick="openModal(this.src)">
            <div class="photo-info">
                <p>2025年5月25日，女儿康奈尔大学学院大楼前毕业照。</p>
            </div>
        </div>
    </div>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <script>
        var modal = document.getElementById("imageModal");
        var modalImg = document.getElementById("fullImage");

        // 打开全图
        function openModal(imageSrc) {
            modal.style.display = "block";
            modalImg.src = imageSrc;
        }

        // 关闭全图
        function closeModal() {
            modal.style.display = "none";
        }
    </script>

</body>
</html>
