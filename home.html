<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的家 - 私密空间</title>

  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.svg">

  <style>
    /* =========================================
       1. 全局基准与滤镜
       ========================================= */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 0;
      padding: 5vh 20px 10vh;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      color: #fff;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      background-image: image-set(url("/mountain-1920.jpg") 1x, url("/mountain-3840.jpg") 2x);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transform: translateZ(0);
      will-change: transform;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.05) 0%, rgba(0, 0, 0, 0.10) 55%, rgba(0, 0, 0, 0.16) 100%);
    }

    /* =========================================
       2. 导航与头部
       ========================================= */
    .nav {
      width: 100%;
      max-width: 1200px;
      margin-bottom: 20px;
    }

    .back-btn {
      text-decoration: none;
      font-size: 0.95em;
      padding: 8px 14px;
      border-radius: 10px;
      display: inline-block;
      transition: .2s;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.14);
    }

    .back-btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.18);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
      color: #fff;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 2.6em;
      font-weight: 600;
      letter-spacing: 1px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
    }

    .header p {
      margin: 0;
      font-size: 1.1em;
      opacity: .92;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    /* 思念信箱 */
    .memorial-banner {
      width: 100%;
      max-width: 1200px; /* 对齐照片墙宽度 */
      border-left: 4px solid rgba(255, 255, 255, 0.55);
      border-radius: 12px;
      padding: 25px 30px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      text-decoration: none;
      color: #fff;
      transition: all .3s ease;
      box-sizing: border-box;
      background: rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 14px 45px rgba(0, 0, 0, 0.14);
    }

    .memorial-banner:hover {
      transform: translateY(-6px);
      background: rgba(255, 255, 255, 0.28);
      border-left-color: #ff7675;
    }

    .memorial-text h3 {
      margin: 0 0 8px;
      font-size: 1.3em;
      font-weight: 600;
      text-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
    }

    .memorial-text p {
      margin: 0;
      color: rgba(255, 255, 255, 0.85);
      font-size: .95em;
    }

    .memorial-icon {
      font-size: 2em;
      color: #ff7675;
      opacity: .9;
    }

    /* =========================================
       3. 瀑布流照片墙核心布局 (Masonry Wall)
       ========================================= */
    .section-title {
      width: 100%;
      max-width: 1200px;
      margin: 40px 0 20px;
      border-bottom: 2px dashed rgba(255, 255, 255, 0.35);
      padding-bottom: 10px;
      color: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .photo-wall {
      width: 100%;
      max-width: 1200px;
      column-count: 3; /* 默认电脑端3列 */
      column-gap: 20px;
    }

    /* 瀑布流卡片 */
    .photo-card {
      break-inside: avoid; /* 防止照片被截断到下一列 */
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .photo-card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.35);
      z-index: 2;
    }

    .photo-img {
      width: 100%;
      height: auto;
      display: block;
      transition: filter 0.3s ease;
    }

    /* 悬浮文字遮罩 */
    .photo-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.4) 60%, transparent 100%);
      padding: 30px 15px 15px;
      color: white;
      opacity: 0; /* 默认隐藏 */
      transition: opacity 0.3s ease;
      pointer-events: none; /* 让鼠标点击能穿透到底部的图片上 */
    }

    .photo-card:hover .photo-info {
      opacity: 1; /* 鼠标悬浮时浮现文字 */
    }

    .photo-info p {
      margin: 0;
      font-size: 0.95em;
      line-height: 1.5;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    }

    /* 响应式瀑布流列数调整 */
    @media (max-width: 900px) {
      .photo-wall { column-count: 2; }
    }
    @media (max-width: 600px) {
      .photo-wall { column-count: 1; }
      .photo-info { opacity: 1; background: linear-gradient(to top, rgba(0, 0, 0, 0.7) 0%, transparent 100%); padding-top: 40px;} /* 手机端默认显示一点文字渐变，防止看不见 */
    }

    /* =========================================
       4. 沉浸式滑动幻灯片 (Lightbox)
       ========================================= */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(8px);
      user-select: none;
    }

    .modal-content-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .modal-content {
      max-width: 100%;
      max-height: 75vh;
      border-radius: 10px;
      box-shadow: 0 5px 25px rgba(0, 0, 0, 0.5);
      object-fit: contain;
    }

    .modal-caption {
      margin-top: 15px;
      color: #fff;
      font-size: 1.1em;
      text-align: center;
      line-height: 1.5;
      max-width: 800px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .modal-counter {
      position: absolute;
      top: 20px;
      left: 35px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 1.1em;
      letter-spacing: 2px;
    }

    .close-btn {
      position: absolute;
      top: 15px;
      right: 30px;
      color: #f1f1f1;
      font-size: 45px;
      font-weight: bold;
      cursor: pointer;
      transition: .3s;
      z-index: 1001;
    }

    .close-btn:hover {
      color: #ff7675;
      transform: scale(1.1);
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 50px;
      font-weight: bold;
      cursor: pointer;
      transition: .3s;
      padding: 20px;
      user-select: none;
    }

    .nav-arrow:hover {
      color: #fff;
    }

    .prev-arrow { left: 5%; }
    .next-arrow { right: 5%; }

    @media (max-width: 768px) {
      .nav-arrow { display: none; }
      .modal-counter { top: 20px; left: 20px; font-size: 1em; }
      .close-btn { top: 10px; right: 20px; font-size: 35px; }
    }

    /* =========================================
       5. 悬浮的一键回顶按钮
       ========================================= */
    #backToTop {
      display: none;
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 99;
      font-size: 20px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      outline: none;
      background: rgba(255, 255, 255, 0.15);
      color: white;
      cursor: pointer;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    #backToTop.show { opacity: 1; pointer-events: auto; }
    #backToTop:hover { background: rgba(255, 255, 255, 0.25); transform: translateY(-5px); }

    /* =========================================
       6. 底部版权区
       ========================================= */
    .site-footer {
      width: 100%;
      max-width: 1200px;
      margin-top: 40px;
      padding: 18px 6px 0;
      text-align: center;
      font-size: 12px;
      line-height: 1.65;
      color: rgba(255, 255, 255, 0.70);
      letter-spacing: 0.2px;
      text-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
    }

    .site-footer .footer-line { margin: 6px 0; }
    .site-footer a { color: rgba(255, 255, 255, 0.86); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="nav">
    <a href="index.html" class="back-btn">← 返回导航页</a>
  </div>

  <div class="header">
    <h1>🐷之家的时光机</h1>
    <p>把平凡的日子，过成闪闪发光的碎片</p>
  </div>

  <a href="memorial.html" class="memorial-banner">
    <div class="memorial-text">
      <h3>🕊️ 寄往天堂的信</h3>
      <p>倍红· 我们永远怀念你</p>
    </div>
    <div class="memorial-icon">🤍</div>
  </a>

   <div class="photo-wall">
    <div class="photo-card">
      <img src="images/202501.jpg" class="photo-img" loading="lazy" alt="女儿康奈尔大学硕士毕业典礼" onerror="this.style.display='none'">
      <div class="photo-info">
        <p>2025年5月25日，女儿康奈尔大学硕士毕业典礼。开启人生新征程！</p>
      </div>
    </div>
    <div class="photo-card">
      <img src="images/XS115599.jpg" class="photo-img" loading="lazy" alt="女儿康奈尔大学学院大楼" onerror="this.style.display='none'">
      <div class="photo-info">
        <p>2025年5月25日，女儿康奈尔大学学院大楼前毕业照。</p>
      </div>
    </div>
  </div>

  
  <div class="photo-wall">
    <div class="photo-card">
      <img src="images/202403.jpg" class="photo-img" loading="lazy" alt="女儿上海大学毕业典礼" onerror="this.style.display='none'">
      <div class="photo-info">
        <p>2024年6月22号，女儿上海大学毕业典礼。为你感到无比骄傲！</p>
      </div>
    </div>
  </div>

  
  <div class="photo-wall">
    <div class="photo-card">
      <img src="images/199602.jpg" class="photo-img" loading="lazy" alt="结婚典礼" onerror="this.style.display='none'">
      <div class="photo-info">
        <p>1996年9月8号，我们结婚了，开启了幸福生活！</p>
      </div>
    </div>
  </div>

  <div id="imageModal" class="modal">
    <span class="close-btn" onclick="closeModal()">&times;</span>
    <div class="modal-counter" id="photoCounter">1 / 1</div>
    <div class="nav-arrow prev-arrow" onclick="prevPhoto(event)">&#10094;</div>
    <div class="nav-arrow next-arrow" onclick="nextPhoto(event)">&#10095;</div>
    <div class="modal-content-wrapper">
      <img class="modal-content" id="fullImage" alt="full">
      <div class="modal-caption" id="photoCaption"></div>
    </div>
  </div>

  <button id="backToTop" title="回到顶部">🚀</button>

  <script>
    // 1. 幻灯片核心逻辑
    let currentIndex = 0;
    let photos = [];
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("fullImage");
    const captionText = document.getElementById("photoCaption");
    const counterText = document.getElementById("photoCounter");

    // 网页加载完成后，自动搜集所有照片
    document.addEventListener("DOMContentLoaded", () => {
      photos = Array.from(document.querySelectorAll('.photo-img'));

      // 为每张照片自动绑定点击事件
      photos.forEach((img, index) => {
        img.addEventListener('click', () => openModal(index));
      });
    });

    function openModal(index) {
      currentIndex = index;
      updateModal();
      modal.style.display = "block";
      document.body.style.overflow = "hidden"; // 背景禁止滑动
    }

    function closeModal() {
      modal.style.display = "none";
      document.body.style.overflow = ""; // 恢复背景滑动
      modalImg.src = ""; // 清空图片防止残影
    }

    function updateModal() {
      if (photos.length === 0) return;
      const currentImg = photos[currentIndex];
      modalImg.src = currentImg.src;
      counterText.innerText = `${currentIndex + 1} / ${photos.length}`;

      // 智能提取照片下方的文字留言放到幻灯片里
      const infoDiv = currentImg.nextElementSibling;
      if (infoDiv && infoDiv.querySelector('p')) {
        captionText.innerText = infoDiv.querySelector('p').innerText;
      } else {
        captionText.innerText = "";
      }
    }

    function prevPhoto(e) {
      if (e) e.stopPropagation();
      currentIndex = (currentIndex > 0) ? currentIndex - 1 : photos.length - 1;
      updateModal();
    }

    function nextPhoto(e) {
      if (e) e.stopPropagation();
      currentIndex = (currentIndex < photos.length - 1) ? currentIndex + 1 : 0;
      updateModal();
    }

    // 2. 手机端触控：左右滑动翻页
    let touchstartX = 0;
    let touchendX = 0;
    modal.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, { passive: true });
    modal.addEventListener('touchend', e => {
      touchendX = e.changedTouches[0].screenX;
      if (touchendX < touchstartX - 40) nextPhoto(); // 向左滑，下一张
      if (touchendX > touchstartX + 40) prevPhoto(); // 向右滑，上一张
    }, { passive: true });

    // 3. 电脑端键盘：方向键翻页，ESC关闭
    document.addEventListener('keydown', e => {
      if (modal.style.display === "block") {
        if (e.key === 'ArrowLeft') prevPhoto();
        if (e.key === 'ArrowRight') nextPhoto();
        if (e.key === 'Escape') closeModal();
      }
    });

    // 4. 点击图片背景任意区域也能关闭
    modal.addEventListener('click', e => {
      if (e.target === modal || e.target.className === 'modal-content-wrapper') closeModal();
    });

    // 5. 悬浮回顶小火箭逻辑
    const btt = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        btt.classList.add('show');
      } else {
        btt.classList.remove('show');
      }
    });
    btt.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>

  <footer class="site-footer">
    <p class="footer-line">© 2026 pangpy.com</p>
    <p class="footer-line">Photo © Hanjun Wang · Grand Teton National Park</p>
    <p class="footer-line">Contact · <a href="mailto:contact@pangpy.com">contact@pangpy.com</a></p>
  </footer>
</body>

</html>
